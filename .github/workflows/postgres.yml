name: PostgreSQL (Kotti)

on:
  push:
    branches: [ master, main, testing, stable ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    # Service containers to run with `runner-job`
    services:
      # Label used to access the service container
      postgres:
        # Docker Hub image
        image: postgres:15
        # Provide the password for postgres
        env:
          POSTGRES_PASSWORD: postgres
        # Set health checks to wait until postgres has started
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          # Maps tcp port 5432 on service container to the host
          - 5432:5432
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      working-directory: ./Kotti
      run: |
        python -m pip install --upgrade pip
        pip install "setuptools==80.10.2"
        pip install -e ".[testing]"
        pip install psycopg2-binary
    
    - name: Test with pytest
      working-directory: ./Kotti
      run: |
        pytest kotti/tests/ -v --tb=short
      env:
        KOTTI_TEST_DB_STRING: postgresql://postgres:postgres@localhost:5432/postgres
