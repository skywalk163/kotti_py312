name: MySQL (Kotti)

on:
  push:
    branches: [ master, main, testing, stable ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    # Service containers to run with `runner-job`
    services:
      # Label used to access the service container
      mysql:
        image: mariadb:10.11
        env:
          MYSQL_USER: kotti
          MYSQL_PASSWORD: kotti
          MYSQL_DATABASE: kotti
          MYSQL_ROOT_PASSWORD: kotti
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=5s
          --health-timeout=2s
          --health-retries=3
        ports:
          # Maps tcp port 3306 on service container to the host
          - 3306:3306

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      working-directory: ./Kotti
      run: |
        python -m pip install --upgrade pip
        pip install "setuptools==80.10.2"
        pip install -e ".[testing]"
        pip install mysqlclient
    
    - name: Verify MySQL connection
      env:
        PORT: ${{ job.services.mysql.ports[3306] }}
      run: |
        while ! mysqladmin ping -h"127.0.0.1" -P"$PORT" --silent; do
          sleep 1
        done
    
    - name: Test with pytest
      working-directory: ./Kotti
      run: |
        pytest kotti/tests/ -v --tb=short
      env:
        KOTTI_TEST_DB_STRING: mysql://kotti:kotti@127.0.0.1:3306/kotti
