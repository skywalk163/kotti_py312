[tox]
envlist = {py38,py39,py310,py311,py312}-{postgresql,sqlite,mysql}

[testenv]
deps =
    postgresql: psycopg2-binary
    mysql: mysqlclient
envdir:
    py38: {toxworkdir}/3.8
    py39: {toxworkdir}/3.9
    py310: {toxworkdir}/3.10
    py311: {toxworkdir}/3.11
    py312: {toxworkdir}/3.12
setenv:
    sqlite: KOTTI_TEST_DB_STRING=sqlite://
    py38-mysql: KOTTI_TEST_DB_STRING=mysql://root@localhost:3306/kotti_testing
    py39-mysql: KOTTI_TEST_DB_STRING=mysql://root@localhost:3306/kotti_testing
    py310-mysql: KOTTI_TEST_DB_STRING=mysql://root@localhost:3306/kotti_testing
    py311-mysql: KOTTI_TEST_DB_STRING=mysql://root@localhost:3306/kotti_testing
    py312-mysql: KOTTI_TEST_DB_STRING=mysql://root@localhost:3306/kotti_testing
    py38-postgresql: KOTTI_TEST_DB_STRING=postgresql://127.0.0.1:5432/kotti_testing
    py39-postgresql: KOTTI_TEST_DB_STRING=postgresql://127.0.0.1:5432/kotti_testing
    py310-postgresql: KOTTI_TEST_DB_STRING=postgresql://127.0.0.1:5432/kotti_testing
    py311-postgresql: KOTTI_TEST_DB_STRING=postgresql://127.0.0.1:5432/kotti_testing
    py312-postgresql: KOTTI_TEST_DB_STRING=postgresql://127.0.0.1:5432/kotti_testing
install_command: pip install {opts} {packages}
whitelist_externals =
    mysql
    psql
commands =
    postgresql: psql -U postgres -c 'CREATE DATABASE kotti_testing;'
    mysql: mysql -u root -e 'CREATE DATABASE kotti_testing CHARACTER SET utf8 COLLATE utf8_general_ci;'
    pip install -e .[testing]
    pytest
    postgresql: psql -U postgres -c 'DROP DATABASE kotti_testing;'
    mysql: mysql -u root -e 'DROP DATABASE kotti_testing;'
