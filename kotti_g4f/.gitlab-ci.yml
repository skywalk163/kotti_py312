# GitLab CI/CD configuration for kotti_g4f

stages:
  - test
  - security
  - build
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

# Cache pip dependencies
cache:
  paths:
    - .cache/pip
    - venv/

# Template for Python setup
.python-template: &python-template
  image: python:3.12
  before_script:
    - python -m pip install --upgrade pip
    - pip install -e ".[testing]"

# Test job
test:
  <<: *python-template
  stage: test
  script:
    - pytest --cov=kotti_g4f --cov-report=xml --cov-report=term-missing
  coverage: '/TOTAL.*\s+(\d+%)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

# Test with multiple Python versions
test:py38:
  image: python:3.8
  extends: test

test:py39:
  image: python:3.9
  extends: test

test:py310:
  image: python:3.10
  extends: test

test:py311:
  image: python:3.11
  extends: test

test:py312:
  image: python:3.12
  extends: test

# Lint job
lint:
  <<: *python-template
  stage: test
  script:
    - pip install black isort flake8
    - black --check --diff kotti_g4f
    - isort --check-only --diff kotti_g4f
    - flake8 kotti_g4f --count --select=E9,F63,F7,F82 --show-source --statistics

# Security scan
security:
  <<: *python-template
  stage: security
  script:
    - pip install bandit safety
    - bandit -r kotti_g4f -ll --skip B101
    - safety check --full-report || true
  allow_failure: true

# Build package
build:
  <<: *python-template
  stage: build
  script:
    - pip install build twine
    - python -m build
    - twine check dist/*
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

# Deploy to PyPI (only on tags)
deploy:pypi:
  stage: deploy
  image: python:3.12
  script:
    - pip install twine
    - twine upload dist/*
  only:
    - tags
  when: manual
  environment:
    name: pypi
    url: https://pypi.org/project/kotti2_g4f/
