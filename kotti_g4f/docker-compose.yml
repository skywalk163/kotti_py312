version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
    command: pserve development.ini --reload

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: kotti
      POSTGRES_PASSWORD: kotti
      POSTGRES_DB: kotti
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
