[app:main]
use = egg:Kotti

# Database configuration
sqlalchemy.url = sqlite:///G:/dumatework/Kotti/kotti.db

# Enable AI Community plugin
kotti.configurators =
    kotti_g4f.kotti_configure
    kotti_ai_community.kotti_configure

# Available content types
kotti.available_types =
    kotti.resources.Document
    kotti.resources.File
    kotti_ai_community.resources.Idea
    kotti_ai_community.resources.ResourceItem

# Email configuration (optional)
kotti.mail.default_sender = noreply@example.com

# Debug settings
pyramid.reload_templates = true
pyramid.debug_authorization = false
pyramid.debug_notfound = false
pyramid.debug_routematch = false
pyramid.default_locale_name = en

# Session configuration
session.secret = your-secret-key-here-change-in-production
kotti.secret = your-secret-key-here-change-in-production

[server:main]
use = egg:waitress#main
host = 0.0.0.0
port = 6542

# Logging configuration
[loggers]
keys = root, kotti, sqlalchemy

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console

[logger_kotti]
level = DEBUG
handlers = console
qualname = kotti

[logger_sqlalchemy]
level = INFO
handlers = console
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s %(levelname)-5.5s [%(name)s][%(threadName)s] %(message)s
